<!DOCTYPE html>
<html lang="es">
<meta charset="utf-8">

<title>Glosas</title>
<link rel="stylesheet" href="{{ site.baseurl }}/style.css">
<header role="banner" id="banner">
<h1>{{ site.title }}</h1>
<em class="eyebrow">{{ site.program }}</em>
</header>


<main id="main" role="main">
<div class="content">
{{ content }}
</div>
<nav id="autores">

{% for autore in site.autores %}
<a href="{{ autore.url }}">{{ autore.title }}</a>
{% endfor %}
</nav>
</main>
</html>
